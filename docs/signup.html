<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<title>Create your company — HR Flow Tunisia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-mark"></div>
      <div class="brand-name">HR Flow<small>Tunisia</small></div>
    </div>
    <span class="trial-chip">✦ 14-day free trial, no card needed</span>
    <h1>Set up your company</h1>
    <p class="auth-sub">Create the workspace your team will use.</p>

    <div class="auth-error" id="signup-error"></div>

    <form id="signup-form">
      <div class="field">
        <label for="company-name">Company name</label>
        <input type="text" id="company-name" required placeholder="e.g. Sfax Textiles SARL" />
      </div>
      <div class="field">
        <label for="industry">Industry</label>
        <select id="industry" required>
          <option value="">Select…</option>
          <option>Retail & Commerce</option>
          <option>Manufacturing</option>
          <option>Textiles</option>
          <option>Construction & BTP</option>
          <option>Technology & IT</option>
          <option>Hospitality & Tourism</option>
          <option>Agriculture</option>
          <option>Healthcare</option>
          <option>Other Services</option>
        </select>
      </div>
      <div class="field">
        <label for="admin-name">Your full name</label>
        <input type="text" id="admin-name" required placeholder="e.g. Amine Ben Salah" />
      </div>
      <div class="field">
        <label for="email">Work email</label>
        <input type="email" id="email" required autocomplete="username" placeholder="you@company.tn" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" autocomplete="new-password" placeholder="At least 6 characters" />
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="signup-btn">Create company workspace</button>
    </form>

    <p class="auth-foot">Already have a workspace? <a href="index.html" style="color:var(--primary); font-weight:600;">Log in</a></p>
  </div>
</div>

<script type="module" src="js/signup.js"></script>
</body>
</html>
