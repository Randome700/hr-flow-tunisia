<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<title>Employees — HR Flow Tunisia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app-shell">
  <div id="sidebar-mount"></div>

  <div class="main">
    <div class="topbar">
      <div>
        <h1>Employees</h1>
        <div class="sub" id="count-label">—</div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary" id="add-employee-btn">➕ Add employee</button>
      </div>
    </div>

    <div class="content">
      <div class="table-wrap">
        <div class="table-toolbar">
          <input class="search-input" id="search-input" type="text" placeholder="Search by name or position…" />
          <span class="text-muted" style="font-size:12.5px;" id="filtered-count"></span>
        </div>
        <table class="stack-mobile">
          <thead>
            <tr><th>Name</th><th>Position</th><th>Role</th><th>Base salary</th><th>Status</th><th></th></tr>
          </thead>
          <tbody id="employees-body">
  <tr><td colspan="6" style="padding:0;">
    <div class="skeleton-row"><div class="skeleton skeleton-text w-20"></div><div class="skeleton skeleton-text w-15"></div><div class="skeleton skeleton-text w-10"></div><div class="skeleton skeleton-text w-10"></div><div class="skeleton skeleton-text w-10"></div></div>
    <div class="skeleton-row"><div class="skeleton skeleton-text w-20"></div><div class="skeleton skeleton-text w-15"></div><div class="skeleton skeleton-text w-10"></div><div class="skeleton skeleton-text w-10"></div><div class="skeleton skeleton-text w-10"></div></div>
    <div class="skeleton-row"><div class="skeleton skeleton-text w-20"></div><div class="skeleton skeleton-text w-15"></div><div class="skeleton skeleton-text w-10"></div><div class="skeleton skeleton-text w-10"></div><div class="skeleton skeleton-text w-10"></div></div>
  </td></tr>
</tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add / Edit modal -->
<div class="modal-backdrop" id="employee-modal">
  <div class="modal">
    <h2 id="modal-title">Add employee</h2>
    <p class="modal-sub">Basic info is enough to start — you can fine-tune salary anytime.</p>
    <form id="employee-form">
      <input type="hidden" id="emp-id" />
      <div class="field">
        <label for="emp-name">Full name</label>
        <input type="text" id="emp-name" required placeholder="e.g. Salma Trabelsi" />
      </div>
      <div class="form-row-2">
        <div class="field">
          <label for="emp-position">Position</label>
          <input type="text" id="emp-position" required placeholder="e.g. Sales Associate" />
        </div>
        <div class="field">
          <label for="emp-role">Role</label>
          <select id="emp-role">
            <option value="employee">Employee</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>
      <div class="form-row-2">
        <div class="field">
          <label for="emp-salary">Base salary (TND / month)</label>
          <input type="number" id="emp-salary" min="0" step="0.001" required placeholder="e.g. 900" />
        </div>
        <div class="field">
          <label for="emp-email">Email (optional)</label>
          <input type="email" id="emp-email" placeholder="employee@company.tn" />
        </div>
      </div>
      <div class="field">
        <label for="emp-status">Status</label>
        <select id="emp-status">
          <option value="true">Active</option>
          <option value="false">Inactive</option>
        </select>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancel-modal-btn">Cancel</button>
        <button type="submit" class="btn btn-primary" id="save-emp-btn">Save employee</button>
      </div>
    </form>
  </div>
</div>

<!-- Delete confirm -->
<div class="modal-backdrop" id="delete-modal">
  <div class="modal">
    <h2>Remove employee?</h2>
    <p class="modal-sub">This deletes their record. Attendance and payroll history stay in your reports, but they'll no longer appear in employee lists.</p>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" id="cancel-delete-btn">Cancel</button>
      <button type="button" class="btn btn-danger" id="confirm-delete-btn">Remove</button>
    </div>
  </div>
</div>

<script type="module" src="js/employees.js"></script>
</body>
</html>
